packages:
  - "apps/*"
  - "packages/*"

autoInstallPeers: false
minimumReleaseAge: 10080
minimumReleaseAgeStrict: false

catalog:
  "@content-collections/core": 0.15.2
  "@content-collections/mdx": 0.2.2
  "@content-collections/next": 0.2.11
  "@fumadocs/content-collections": 1.2.9
  "@types/mdx": 2.0.14
  "@types/node": 26.0.1
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  "@turbo/gen": 2.10.0
  fumadocs-core: 16.10.5
  fumadocs-ui: 16.10.5
  next: 16.2.9
  prettier: 3.8.4
  react: 19.2.7
  react-dom: 19.2.7
  typescript: 6.0.3
  zod: 4.4.3

catalogMode: manual
cleanupUnusedCatalogs: true
enablePrePostScripts: true

overrides:
  "@babel/runtime": 7.29.7
  js-yaml: 4.2.0
  nanoid: 3.3.11
  postcss: 8.5.15
  uuid: 11.1.1

savePrefix: ""
strictPeerDependencies: false

peerDependencyRules:
  allowAny:
    - react
    - react-dom
    - typescript

minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.10.0'
  - '@turbo/darwin-arm64@2.10.0'
  - '@turbo/gen@2.10.0'
  - '@turbo/linux-64@2.10.0'
  - '@turbo/linux-arm64@2.10.0'
  - '@turbo/windows-64@2.10.0'
  - '@turbo/windows-arm64@2.10.0'
  - '@types/node@26.0.1'
  - fumadocs-core@16.10.5
  - fumadocs-ui@16.10.5
  - turbo@2.10.0

allowBuilds:
  esbuild: false
  sharp: false
